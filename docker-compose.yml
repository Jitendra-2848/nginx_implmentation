version: "3.8"

services:
  nginx:
    image: nginx:1.25
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - app1
      - app2

  app:
    image: nginx_test
    environment:
      - INSTANCE_ID=1

  app1:
    image: nginx_test
    environment:
      - INSTANCE_ID=2

  app2:
    image: nginx_test
    environment:
      - INSTANCE_ID=3